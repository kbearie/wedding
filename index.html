<!DOCTYPE html>
<html>
<head>
  <title>Katherine & Gavin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

  <style>
    .site-title {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  letter-spacing: 4px;
  color: #5a3a2e;
}
    .countdown {
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background-image: url("wedding.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
    }

    .nav {
      position: absolute;
      top: 35px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      z-index: 10;
    }

    .nav a {
      text-decoration: none;
      color: #5a3a2e;
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .bottom-text {
      color: #5a3a2e;
      text-align: center;
      margin-bottom: 70px;
      letter-spacing: 3px;
    }

    .location {
      font-size: 32px;
      margin-bottom: 6px;
    }

    .coming {
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

<div class="site-title">Katherine & Gavin</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="flying-b-ranch.html">Flying B Ranch</a>
  <a href="travel.html">Travel</a>
  <a href="wedding-week.html">Wedding Week</a>
  <a href="details.html">Details</a>
  <a href="gallery.html">Photo Gallery</a>
  <a href="rsvp.html">RSVP</a>
</div>

  <div class="bottom-text">
  <div class="location">Durango, Colorado</div>
  <div id="countdown" class="countdown"></div>
  <div class="coming">More information coming soon</div>
</div>
<script>
  const weddingDate = new Date("July 17, 2027 00:00:00").getTime();
  const countdown = document.getElementById("countdown");

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = weddingDate - now;

    if (distance <= 0) {
      countdown.innerHTML = "It's wedding day";
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    countdown.innerHTML = days + " days to go";
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
</body>
