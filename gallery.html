}

  font-size: 18px;
}

.gallery {
    max-width: 1200px;
    margin: 50px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 8px 25px rgba(0,0,0,.15);
    transition: transform .3s;
}

.gallery img:hover {
    transform: scale(1.03);
}
