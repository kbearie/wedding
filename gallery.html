<!DOCTYPE html>
<html>

<head>
<title>Photo Gallery | Katherine & Gavin</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Cinzel', serif;
  background-color: #f7f4ef;
  color: #5a3a2e;
}
.site-title {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 40px;
  letter-spacing: 6px;
  color: #5a3a2e;
  white-space: nowrap;
}
.nav {
  position: absolute;
  top: 85px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
  width: 90%;
}

.nav a {
  text-decoration: none;
  color: #5a3a2e;
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.nav::after {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: -15px;
  width: 60%;
  height: 1px;
  background-color: rgba(90, 58, 46, 0.3);
}
.page {
  padding-top: 225px;
  text-align: center;
}

h1 {
  font-size: 40px;
  letter-spacing: 3px;
}

p {
  font-size: 18px;
}

.gallery {
  max-width: 1200px;
  margin: 50px auto;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 20px;
  padding: 20px;
}

.gallery img {
  width: 100%;
  display: block;
  border-radius: 8px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.10);
}

.feature-photo,
.wide-photo {
  grid-column: 1 / -1;
}

.feature-photo,
.wide-photo {
  height: auto;
}

.half-photo {
  height: 420px;
  object-fit: cover;
}

.tall-photo {
  height: 700px;
  object-fit: cover;
}

.small-photo {
  height: 420px;
  object-fit: cover;
}

@media (max-width: 768px) {
  .gallery {
    grid-template-columns: 1fr;
    gap: 16px;
    padding: 12px;
  }

  .feature-photo,
  .wide-photo,
  .gaslight-photo,
  .tall-photo,
  .small-photo {
    grid-column: auto;
    height: auto;
    object-fit: contain;
  }
}
}
  
/* MOBILE */
@media (max-width: 768px) {
  .nav {
    gap: 18px;
    top: 25px;
  }

  .nav a {
    font-size: 13px;
  }

  .page {
    padding-top: 280px;
  }

  h1 {
    font-size: 30px;
  }

  p {
    font-size: 16px;
  }
}

</style>

</head>
